name: Build Android arm64-v8a Release APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: 22
      JAVA_VERSION: 17

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # 生成原生 Android 工程（managed Expo 项目需要先 prebuild）
      - name: Expo Prebuild
        run: npx expo prebuild --clean --platform android

      # 将 base64 签名密钥解码为 android/app/app.key
      - name: Decode signing keystore
        working-directory: android/app
        run: |
          echo "${{ secrets.KEY_BASE64 }}" | base64 -d > app.key

      # 将签名配置写入 key.properties，并去掉值两侧可能的引号，避免 Gradle 把引号当成密码的一部分
      - name: Write signing properties
        working-directory: android
        run: |
          cat << 'PROPS' > key.properties
          ${{ secrets.SIGNING_CONFIG }}
          PROPS
          sed -i 's/^\(storePassword\|keyPassword\|keyAlias\|storeFile\)="\([^"]*\)"/\1=\2/g' key.properties

      # 注入 ABI split：仅打包 arm64-v8a，产物即为 app-arm64-v8a-release.apk
      - name: Enable ABI split (arm64-v8a only)
        working-directory: android/app
        run: |
          node << 'NODE_EOF'
          const fs = require('fs');
          const file = 'build.gradle';
          let content = fs.readFileSync(file, 'utf8');

          if (!content.includes('splits')) {
            const block = `
    splits {
        abi {
            enable true
            reset()
            include 'arm64-v8a'
            universalApk false
        }
    }`;
            const idx = content.indexOf('android {');
            if (idx !== -1) {
              const insertPos = idx + 'android {'.length;
              content = content.slice(0, insertPos) + block + content.slice(insertPos);
            }
          }
          fs.writeFileSync(file, content);
          NODE_EOF

      - name: Build Release APK
        working-directory: android
        run: ./gradlew :app:assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-release
          path: android/app/build/outputs/apk/release/app-arm64-v8a-release.apk
          if-no-files-found: error

      # 如需自动发版，请将 Token 存入仓库 Secrets 并命名为 GH_TOKEN
      # 若不需要，可直接删除下面整个步骤
      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-arm64-v8a-release.apk
          tag_name: v${{ github.run_number }}-${{ github.sha }}
          name: Release v${{ github.run_number }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
