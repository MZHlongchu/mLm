name: Build Android arm64 APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - run: yarn install --frozen-lockfile

      - run: echo '{}' > google-services.json

      - run: npx expo prebuild --clean --platform android

      - name: Prepare build files
        run: |
          echo "${{ secrets.KEY_BASE64 }}" | base64 -d > android/app/app.key
          echo "${{ secrets.SIGNING_CONFIG }}" > android/key.properties

      - name: Enable ABI split
        working-directory: android/app
        run: |
          node -e "
          const fs = require('fs');
          let c = fs.readFileSync('build.gradle','utf8');
          if (!c.includes('splits')) {
            const b = \`
    splits {
        abi {
            enable true
            reset()
            include 'arm64-v8a'
            universalApk false
        }
    }\`;
            const i = c.indexOf('android {');
            if (i !== -1) c = c.slice(0, i+9) + b + c.slice(i+9);
          }
          fs.writeFileSync('build.gradle', c);
          "

      - name: Build APK
        working-directory: android
        run: ./gradlew :app:assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-release
          path: android/app/build/outputs/apk/release/app-arm64-v8a-release.apk
