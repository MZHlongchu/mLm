name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '22'
      JAVA_VERSION: '17'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Create google-services.json placeholder
        run: echo '{}' > google-services.json

      - name: Expo Prebuild
        run: npx expo prebuild --clean --platform android

      - name: Check android directory
        run: ls -la android/app/

      - name: Decode signing keystore
        working-directory: android/app
        run: echo "${{ secrets.KEY_BASE64 }}" | base64 -d > app.key

      - name: Write signing properties
        working-directory: android
        run: |
          printf '%s\n' '${{ secrets.SIGNING_CONFIG }}' > key.properties
          echo "--- key.properties content ---"
          cat key.properties

      - name: Enable ABI split (arm64-v8a only)
        working-directory: android/app
        run: |
          node -e "
          const fs = require('fs');
          const file = 'build.gradle';
          let content = fs.readFileSync(file, 'utf8');
          if (!content.includes('splits')) {
            const block = \`
    splits {
        abi {
            enable true
            reset()
            include 'arm64-v8a'
            universalApk false
        }
    }\`;
            const idx = content.indexOf('android {');
            if (idx !== -1) {
              const insertPos = idx + 'android {'.length;
              content = content.slice(0, insertPos) + block + content.slice(insertPos);
            }
          }
          fs.writeFileSync(file, content);
          console.log('ABI split injected');
          "

      - name: Build Release APK
        working-directory: android
        timeout-minutes: 30
        run: ./gradlew :app:assembleRelease --console=plain --info

      - name: List output files
        run: ls -la android/app/build/outputs/apk/release/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-release
          path: android/app/build/outputs/apk/release/app-arm64-v8a-release.apk
          if-no-files-found: warn
