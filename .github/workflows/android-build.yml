name: Android Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: yarn install --frozen-lockfile
      - run: echo '{}' > google-services.json
      - run: npx expo prebuild --clean --platform android
      - run: echo "${{ secrets.KEY_BASE64 }}" | base64 -d > android/app/app.key
      - name: Write signing config
        run: |
          echo "${{ secrets.SIGNING_CONFIG }}" > android/key.properties
          # Remove quotes from values
          sed -i 's/^\(storePassword\|keyPassword\|keyAlias\|storeFile\)="\([^"]*\)"/\1=\2/g' android/key.properties
          cat android/key.properties
      - name: Test Gradle
        working-directory: android
        run: ./gradlew tasks --no-daemon
      - name: Build APK
        working-directory: android
        timeout-minutes: 45
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace
      - run: ls -la android/app/build/outputs/apk/release/
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
