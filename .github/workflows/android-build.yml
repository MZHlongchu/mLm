name: Android Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: yarn install --frozen-lockfile
      - name: Create google-services.json
        run: |
          cat > google-services.json << 'JSONEOF'
          {
            "project_info": {
              "project_number": "123456789",
              "project_id": "placeholder",
              "storage_bucket": "placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:123456789:android:placeholder",
                  "android_client_info": {
                    "package_name": "com.gorai.ragionare"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "placeholder-key"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          JSONEOF
      - run: npx expo prebuild --clean --platform android
      - run: echo "${{ secrets.KEY_BASE64 }}" | base64 -d > android/app/app.key
      - name: Write signing config
        run: |
          echo "${{ secrets.SIGNING_CONFIG }}" > android/key.properties
          sed -i 's/^\(storePassword\|keyPassword\|keyAlias\|storeFile\)="\([^"]*\)"/\1=\2/g' android/key.properties
      - name: Enable ABI split for arm64-v8a
        working-directory: android/app
        run: |
          python3 -c "
          import re
          with open('build.gradle', 'r') as f:
              content = f.read()
          if 'splits' not in content:
              block = '''    splits {
        abi {
            enable true
            reset()
            include 'arm64-v8a'
            universalApk false
        }
    }'''
              content = content.replace('android {', 'android {\n' + block, 1)
              with open('build.gradle', 'w') as f:
                  f.write(content)
              print('ABI split injected')
          else:
              print('ABI split already exists')
          "
          grep -A 8 "splits" build.gradle
      - name: Build APK
        working-directory: android
        timeout-minutes: 45
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace
      - name: List outputs
        run: ls -la android/app/build/outputs/apk/release/
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-release
          path: android/app/build/outputs/apk/release/app-arm64-v8a-release.apk
          if-no-files-found: warn
