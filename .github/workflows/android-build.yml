name: Android Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: yarn install --frozen-lockfile
      - run: echo '{}' > google-services.json
      - run: npx expo prebuild --clean --platform android
      - run: echo "${{ secrets.KEY_BASE64 }}" | base64 -d > android/app/app.key
      - run: echo "${{ secrets.SIGNING_CONFIG }}" > android/key.properties
      - name: Enable ABI split
        run: |
          python3 -c "
          import re
          with open('android/app/build.gradle', 'r') as f:
              content = f.read()
          if 'splits' not in content:
              block = '''    splits {
        abi {
            enable true
            reset()
            include 'arm64-v8a'
            universalApk false
        }
    }'''
              content = content.replace('android {', 'android {\n' + block, 1)
              with open('android/app/build.gradle', 'w') as f:
                  f.write(content)
              print('ABI split injected')
          else:
              print('ABI split already exists')
          "
      - run: grep -A 8 "splits" android/app/build.gradle
      - name: Build APK
        working-directory: android
        run: ./gradlew :app:assembleRelease --console=plain --no-daemon
      - run: ls -la android/app/build/outputs/apk/release/
      - uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-release
          path: android/app/build/outputs/apk/release/app-arm64-v8a-release.apk
          if-no-files-found: warn
